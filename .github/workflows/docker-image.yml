name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u abdullahahmed1101076 --password-stdin

    - name: Build Image
      run: docker build -t abdullahahmed1101076/portfolio .

    - name: Push Image
      run: docker push abdullahahmed1101076/portfolio
